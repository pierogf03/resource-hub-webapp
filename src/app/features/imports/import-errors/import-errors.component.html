<app-page-header
  title="Errores de importación"
  [subtitle]="'Batch: ' + batchId"
></app-page-header>

<a mat-button routerLink="/imports/history">Volver al historial</a>

@if (loading) {
  <app-loading-spinner></app-loading-spinner>
} @else if (errors.length === 0) {
  <app-empty-state message="No hay errores para este batch."></app-empty-state>
} @else {
  <div class="table-container">
    <table mat-table [dataSource]="errors">
      <ng-container matColumnDef="row_number">
        <th mat-header-cell *matHeaderCellDef>Fila</th>
        <td mat-cell *matCellDef="let row">{{ row.row_number }}</td>
      </ng-container>
      <ng-container matColumnDef="column_name">
        <th mat-header-cell *matHeaderCellDef>Columna</th>
        <td mat-cell *matCellDef="let row">{{ row.column_name || '-' }}</td>
      </ng-container>
      <ng-container matColumnDef="error_message">
        <th mat-header-cell *matHeaderCellDef>Mensaje de error</th>
        <td mat-cell *matCellDef="let row">{{ row.error_message }}</td>
      </ng-container>
      <ng-container matColumnDef="raw_data">
        <th mat-header-cell *matHeaderCellDef>Data cruda</th>
        <td mat-cell *matCellDef="let row">
          @if (row.raw_data) {
            <code>{{ row.raw_data | json }}</code>
          } @else {
            -
          }
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>
}
