<app-page-header
  title="Recursos externos"
  subtitle="Gestiona consultores externos y sus perfiles técnicos"
  actionLabel="Nuevo recurso"
  [showAction]="true"
  (actionClick)="openForm()"
></app-page-header>

<app-search-filter-bar placeholder="Buscar consultor..." (searchChange)="onSearch($event)"></app-search-filter-bar>

@if (loading) {
  <app-loading-spinner></app-loading-spinner>
} @else if (resources.length === 0) {
  <app-empty-state message="No hay recursos externos registrados."></app-empty-state>
} @else {
  <div class="table-container">
    <table mat-table [dataSource]="resources">
      <ng-container matColumnDef="consultant_name">
        <th mat-header-cell *matHeaderCellDef>Consultor</th>
        <td mat-cell *matCellDef="let row">{{ row.consultant_name }}</td>
      </ng-container>
      <ng-container matColumnDef="technical_profile">
        <th mat-header-cell *matHeaderCellDef>Perfil técnico</th>
        <td mat-cell *matCellDef="let row">{{ row.technical_profile }}</td>
      </ng-container>
      <ng-container matColumnDef="document_number">
        <th mat-header-cell *matHeaderCellDef>Documento</th>
        <td mat-cell *matCellDef="let row">{{ row.document_number || '-' }}</td>
      </ng-container>
      <ng-container matColumnDef="is_active">
        <th mat-header-cell *matHeaderCellDef>Estado</th>
        <td mat-cell *matCellDef="let row">{{ row.is_active ? 'Activo' : 'Inactivo' }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button (click)="openForm(row)" aria-label="Editar">
            <mat-icon>edit</mat-icon>
          </button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>
  <mat-paginator
    [length]="total"
    [pageSize]="pageSize"
    [pageIndex]="page - 1"
    [pageSizeOptions]="[5, 10, 25]"
    (page)="onPage($event)"
  ></mat-paginator>
}
