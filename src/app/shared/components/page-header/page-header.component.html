<div class="page-header">
  <div class="page-header__text">
    <h1>{{ title }}</h1>
    @if (subtitle) {
      <p>{{ subtitle }}</p>
    }
  </div>
  @if (showAction) {
    <button mat-flat-button color="primary" (click)="actionClick.emit()">
      <mat-icon>{{ icon }}</mat-icon>
      {{ actionLabel }}
    </button>
  }
</div>
